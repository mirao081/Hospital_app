{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<!-- In your base.html or login.html -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
    <h2 class="text-2xl font-semibold text-center mb-6">Login</h2>

    {% if error %}
      <p class="text-red-500 text-sm text-center mb-4">{{ error }}</p>
    {% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div>
        <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Role</label>
        <select name="role" id="role" required class="w-full border border-gray-300 rounded-md px-3 py-2">
          <option value="">-- Select Role --</option>
          {% for role in roles %}
            <option value="{{ role }}" {% if request.POST.role == role %}selected{% endif %}>
              {{ role|capfirst }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" id="username" required
               value="{{ request.POST.username }}"
               class="w-full border border-gray-300 rounded-md px-3 py-2" />
      </div>

     <div class="relative">
      <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" id="password" required
            class="w-full border border-gray-300 rounded-md px-3 py-2 pr-10" />
      <span class="absolute top-1/2 right-3 transform -translate-y-1/2 cursor-pointer text-gray-500"
          onclick="togglePassword()">

        <i id="toggleIcon" class="fa-solid fa-eye"></i>
      </span>
    </div>


      <div class="text-center">
        <button type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700 transition duration-200">
          Login
        </button>
      </div>
    </form>
  </div>
</div>
<script>
  function togglePassword() {
    const passwordInput = document.getElementById("password");
    const toggleIcon = document.getElementById("toggleIcon");

    if (passwordInput.type === "password") {
      passwordInput.type = "text";
      toggleIcon.classList.remove("fa-eye");
      toggleIcon.classList.add("fa-eye-slash");
    } else {
      passwordInput.type = "password";
      toggleIcon.classList.remove("fa-eye-slash");
      toggleIcon.classList.add("fa-eye");
    }
  }
</script>

{% endblock %}
{% block footer %}{% endblock %}
