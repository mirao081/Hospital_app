{% extends 'core/base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 mt-10 rounded shadow">
    <h2 class="text-xl font-semibold mb-4">Unassign Patient from Bed</h2>
    <p>Are you sure you want to unassign {{ bed.patient.user.get_full_name }} from {{ bed }}?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 text-white px-4 py-2 mt-4 rounded hover:bg-red-700">Unassign</button>
        <a href="{% url 'assign_bed' %}" class="ml-4 text-gray-600 hover:underline">Cancel</a>
    </form>
</div>
{% endblock %}
