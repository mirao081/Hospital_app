{% extends "core/base.html" %}
{% block title %}{{ blog.title }}{% endblock %}
{% block content %}

<div class="page-banner" style="padding: 50px; background-color: #f9f9f9;">
  <h1>{{ blog.title }}</h1>
  <p><a href="{% url 'landing_page' %}">Home</a> >> <a href="{% url 'blogs' %}">Blog</a> >> {{ blog.title }}</p>
</div>

<div class="blog-content" style="padding: 40px;">
  {% if blog.image %}
    <img src="{{ blog.image.url }}" alt="{{ blog.title }}" style="max-width: 100%; height: auto; margin-bottom: 30px;">
  {% endif %}
  <p>{{ blog.content|linebreaks }}</p>
</div>

{% endblock %}
