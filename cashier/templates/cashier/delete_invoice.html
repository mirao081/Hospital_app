{% extends 'core/base.html' %}
{% block content %}

<div class="max-w-xl bg-white p-6 rounded shadow">
  <h2 class="text-xl font-bold mb-4 text-red-700">Delete Invoice</h2>

  <p>Are you sure you want to delete the invoice for <strong>{{ invoice.patient_name }}</strong> ({{ invoice.invoice_number }})?</p>

  <form method="post" class="mt-4 flex gap-4">
    {% csrf_token %}
    <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Yes, Delete</button>
    <a href="{% url 'cashier_invoice_list' %}" class="text-gray-600 underline">Cancel</a>
  </form>
</div>

{% endblock %}
