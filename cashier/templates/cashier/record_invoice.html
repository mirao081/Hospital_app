{% extends 'core/base.html' %}
{% block content %}
<h2 class="text-2xl font-bold mb-4">Record New Billing</h2>

<form method="post" class="space-y-4 bg-white p-6 rounded shadow">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
    Submit Invoice
  </button>
</form>

<a href="{% url 'cashier:cashier_dashboard' %}" class="text-blue-600 hover:underline mt-4 inline-block">← Back to Dashboard</a>
{% endblock %}
