{% extends "core/base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white/10 text-white border border-white/30 rounded-xl p-6 mt-6">
    <h2 class="text-2xl font-bold mb-4">Add Note for {{ patient.full_name }}</h2>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label for="note" class="block mb-1 font-medium">Note:</label>
            <textarea id="note" name="note" rows="5"
                      class="w-full border border-white/30 p-2 rounded bg-white/5 text-white placeholder-white/50"
                      placeholder="Enter your note here...">{{ note.note|default_if_none:"" }}</textarea>
        </div>

        <button type="submit"
                class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded transition">
            Add Note
        </button>
    </form>

    {% if messages %}
        <div class="mt-4">
            {% for message in messages %}
                <p class="text-sm text-green-400">{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}
</div>
{% endblock content %}
