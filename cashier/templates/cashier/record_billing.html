{% extends 'core/base.html' %}

{% block content %}
<h2 class="text-2xl font-bold mb-4">Record New Billing</h2>

<form method="post" class="bg-white p-6 shadow rounded space-y-4">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
    Submit
  </button>
</form>

<a href="{% url 'cashier:cashier_dashboard' %}" class="text-blue-600 hover:underline block mt-4">← Back to Dashboard</a>
{% endblock %}
