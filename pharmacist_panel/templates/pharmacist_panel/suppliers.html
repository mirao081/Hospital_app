{% extends 'core/base.html' %}

{% block content %}
<h2>Suppliers</h2>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Supplier Name</th>
            <th>Contact Info</th>
        </tr>
    </thead>
    <tbody>
        {% for supplier in suppliers %}
        <tr>
            <td>{{ supplier.name }}</td>
            <td>{{ supplier.contact_info }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="2">No suppliers found.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
