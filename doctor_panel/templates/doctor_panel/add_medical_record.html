{% extends "core/base.html" %}

{% block content %}
<div class="container mt-4">
  <h2 class="text-center fw-bold mb-4" style="font-size: 28px; color: #000000;">➕ Add Medical Record</h2>

  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Record</button>
        <a href="{% url 'doctor_panel:doctor_dashboard' %}" class="btn btn-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
