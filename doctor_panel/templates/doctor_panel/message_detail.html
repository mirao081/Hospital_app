{% extends "core/base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 bg-white shadow rounded-lg p-6">
  <h2 class="text-xl font-bold text-blue-700 mb-4">📨 Message Detail</h2>

  <p><strong>From:</strong> {{ message.sender.get_full_name|default:message.sender.username }}</p>
  {% if message.subject %}
    <p><strong>Subject:</strong> {{ message.subject }}</p>
  {% endif %}
  <p class="text-sm text-gray-600">Received {{ message.sent_at }}</p>

  <hr class="my-4">
  <p>{{ message.body }}</p>

  <a href="{% url 'doctor_panel:inbox' %}" class="mt-6 inline-block text-blue-600 hover:underline">← Back to Inbox</a>
</div>
{% endblock %}
