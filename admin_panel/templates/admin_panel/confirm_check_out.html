{% extends 'core/base.html' %}

{% block title %}Check Out{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-4 text-blue-700">Check Out</h2>
    <p class="mb-6">Hi {{ staff.user.get_full_name }}, are you sure you want to check out?</p>

    <form method="post" class="space-x-4">
        {% csrf_token %}
        <button type="submit" class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600">
            ✅ Yes, Check Out
        </button>
        <a href="{% url 'admin_panel:admin_dashboard' %}" class="inline-block bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
