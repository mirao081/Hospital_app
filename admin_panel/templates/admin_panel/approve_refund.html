{% extends "core/base.html" %}
{% block content %}
<h2 class="text-2xl font-bold text-blue-700 mb-6">Approve or Reject Refund</h2>

<form method="post" class="space-y-4 bg-white p-6 rounded shadow max-w-xl">
  {% csrf_token %}
  
  <div>
    <label class="block font-semibold">Patient</label>
    <p class="text-gray-800">{{ refund.payment.patient_name }}</p>
  </div>

  <div>
    <label class="block font-semibold">Amount</label>
    <p class="text-gray-800">${{ refund.refund_amount }}</p>
  </div>

  <div>
    <label class="block font-semibold">Reason</label>
    <p class="text-gray-800">{{ refund.reason }}</p>
  </div>

  <div>
    <label class="block font-semibold">Admin Note (optional)</label>
    <textarea name="admin_note" rows="4" class="w-full border border-gray-300 p-2 rounded" placeholder="Add any notes...">{{ refund.admin_note }}</textarea>
  </div>

  <div class="flex gap-4 mt-4">
    <button name="action" value="approve" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
      ✅ Approve
    </button>
    <button name="action" value="reject" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
      ❌ Reject
    </button>
  </div>
</form>
{% endblock %}
